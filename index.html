<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI TTS 음성 변환기</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    /* 상단 로그인/회원가입 바 (디자인을 해치지 않게 심플하게 배치) */
    .auth-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .auth-input {
      height: 34px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      width: 140px;
      outline: none;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .option-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    select, input[type="number"] {
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
      font-family: Arial, sans-serif;
    }

    textarea:focus, select:focus, input:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, .download-link {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover, .download-link:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .make-btn { background: #42a5f5; color: white; }
    .clear-btn { background: #b0bec5; color: white; }
    .auth-btn { background: #37474f; color: white; height: 34px; font-size: 13px; border-radius: 8px; padding: 0 12px; }
    .download-link { background: #7e57c2; color: white; }

    .hidden { display: none; }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: #555;
      font-size: 14px;
    }

    .result-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: #f7f9fb;
      border: 1px solid #edf1f5;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .help {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .option-box { grid-template-columns: 1fr; }
      .button-row { justify-content: stretch; }
      button, .download-link { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-bar" id="authBar">
      <input type="email" id="emailInput" class="auth-input" placeholder="이메일">
      <input type="password" id="passwordInput" class="auth-input" placeholder="비밀번호">
      <button id="signUpBtn" class="auth-btn" style="background:#78909c;">회원가입</button>
      <button id="signInBtn" class="auth-btn">로그인</button>
    </div>
    <div class="auth-bar hidden" id="welcomeBar">
      <span id="userInfo" style="font-weight:bold; color:#555; font-size:13px;"></span>
      <button id="signOutBtn" class="auth-btn">로그아웃</button>
    </div>

    <h1>AI TTS 음성 변환기</h1>
    <div class="subtitle">텍스트를 AI 음성 mp3 파일로 변환합니다</div>

    <div id="mainApp">
      <div class="option-box">
        <select id="modelSelect">
          <option value="tts-1">tts-1 빠른 생성</option>
          <option value="tts-1-hd">tts-1-hd 고품질</option>
        </select>

        <select id="voiceSelect">
          <option value="alloy">alloy</option>
          <option value="echo">echo</option>
          <option value="fable">fable</option>
          <option value="onyx">onyx</option>
          <option value="nova">nova</option>
          <option value="shimmer">shimmer</option>
        </select>

        <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" placeholder="속도" />
      </div>

      <div>
        <div class="label">변환할 텍스트</div>
        <textarea id="textInput" placeholder="음성으로 바꿀 문장을 입력하세요."></textarea>
      </div>

      <div class="button-row">
        <button class="clear-btn" id="clearBtn">초기화</button>
        <button class="make-btn" id="makeBtn">음성 만들기</button>
      </div>

      <div id="status" class="status"></div>

      <div id="resultBox" class="result-box hidden">
        <div class="label">생성된 음성</div>
        <audio id="audioPlayer" controls></audio>
        <div class="button-row">
          <a id="downloadLink" class="download-link" href="#" download="tts-audio.mp3">mp3 다운로드</a>
        </div>
      </div>
    </div>

    <div class="help">
      로그인 후 서비스를 이용하실 수 있습니다. 속도는 0.25부터 4.0까지 조절할 수 있습니다.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 💡 사용자님의 진짜 파이어베이스 설정값 입력 완료!
    const firebaseConfig = {
      apiKey: "AIzaSyBQfMN55VcllE9TAeyrzRHRyzsu2dT3bdA",
      authDomain: "project-f4bd5.firebaseapp.com",
      projectId: "project-f4bd5",
      storageBucket: "project-f4bd5.firebasestorage.app",
      messagingSenderId: "725979068316",
      appId: "1:725979068316:web:c08300ad7cd37845c9ba59",
      measurementId: "G-T52MEST67Q"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let currentUser = null;

    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const signUpBtn = document.getElementById('signUpBtn');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const authBar = document.getElementById('authBar');
    const welcomeBar = document.getElementById('welcomeBar');
    const userInfo = document.getElementById('userInfo');

    // 회원가입
    signUpBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if(!email || !password) return alert("이메일과 비밀번호를 입력해주세요.");
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("회원가입 성공!"))
        .catch(err => alert("회원가입 실패: " + err.message));
    });

    // 로그인
    signInBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if(!email || !password) return alert("이메일과 비밀번호를 입력해주세요.");

      signInWithEmailAndPassword(auth, email, password)
        .catch(err => alert("로그인 실패: " + err.message));
    });

    // 로그아웃
    signOutBtn.addEventListener('click', () => {
      signOut(auth);
    });

    // 로그인 상태 변화 실시간 감시
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        userInfo.textContent = `${user.email}님 환영합니다!`;
        authBar.classList.add('hidden');
        welcomeBar.classList.remove('hidden');
        makeBtn.disabled = false; // 로그인 시 버튼 활성화
      } else {
        currentUser = null;
        authBar.classList.remove('hidden');
        welcomeBar.classList.add('hidden');
        makeBtn.disabled = true; // 비로그인 시 버튼 비활성화
      }
    });

    // --- 원본 TTS 통신 로직 그대로 유지 ---
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzvCeCidpIBm3Ez_AbmzTRrvzCkPa_7x-irAazDPzljPmuqjjHZOqXxfyS1vNh7tX1/exec';

    const textInput = document.getElementById('textInput');
    const modelSelect = document.getElementById('modelSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speedInput');
    const makeBtn = document.getElementById('makeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');

    makeBtn.addEventListener('click', makeSpeech);
    clearBtn.addEventListener('click', clearPage);

    textInput.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && event.ctrlKey) {
        makeSpeech();
      }
    });

    async function makeSpeech() {
      if (!currentUser) {
        alert("로그인 후 이용할 수 있는 기능입니다.");
        return;
      }

      const text = textInput.value.trim();
      const model = modelSelect.value;
      const voice = voiceSelect.value;
      const speed = Number(speedInput.value || 1.0);

      if (!text) {
        alert('음성으로 변환할 텍스트를 입력해주세요.');
        return;
      }

      if (speed < 0.25 || speed > 4.0) {
        alert('속도는 0.25부터 4.0 사이로 입력해주세요.');
        return;
      }

      try {
        setLoading(true);
        resultBox.classList.add('hidden');
        statusBox.textContent = 'Apps Script 서버에 요청을 보내는 중입니다.';

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'tts',
            text: text,
            model: model,
            voice: voice,
            speed: speed
          })
        });

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        if (!data.audioBase64) {
          throw new Error('음성 데이터를 받지 못했습니다.');
        }

        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');

        audioPlayer.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.download = makeFileName();
        resultBox.classList.remove('hidden');
        statusBox.textContent = '음성 생성 완료';
      } catch (error) {
        console.error(error);
        statusBox.textContent = '요청 실패';
        alert('오류가 발생했습니다.\n\n' + error.message);
      } finally {
        setLoading(false);
      }
    }

    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];

      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);

        for (let i = 0; i < slice.length; i++) {
          byteNumbers[i] = slice.charCodeAt(i);
        }

        const byteArray = new Uint8Array(byteNumbers);
        byteArrays.push(byteArray);
      }

      const blob = new Blob(byteArrays, { type: mimeType });
      return URL.createObjectURL(blob);
    }

    function makeFileName() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hour = String(now.getHours()).padStart(2, '0');
      const minute = String(now.getMinutes()).padStart(2, '0');
      return `tts-${year}${month}${day}-${hour}${minute}.mp3`;
    }

    function setLoading(isLoading) {
      makeBtn.disabled = isLoading;
      makeBtn.textContent = isLoading ? '생성 중...' : '음성 만들기';
    }

    function clearInterval() {
      textInput.value = '';
      statusBox.textContent = '';
      audioPlayer.removeAttribute('src');
      downloadLink.href = '#';
      resultBox.classList.add('hidden');
    }
  </script>
</body>
</html>
