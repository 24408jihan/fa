<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보이스 크래프트 | AI 콘텐츠 스튜디오</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }
    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }
    .auth-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .auth-input {
      height: 34px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      width: 140px;
      outline: none;
    }
    h1 { margin: 0 0 8px; text-align: center; font-size: 28px; }
    .subtitle { text-align: center; color: #777; margin-bottom: 24px; font-size: 14px; }
    .info {
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 14px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 14px;
      line-height: 1.6;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #edf1f5;
      padding-bottom: 10px;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: #888;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.2s;
    }
    .tab-btn.active {
      color: #42a5f5;
      background: rgba(66, 165, 245, 0.1);
    }
    .option-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    select, input[type="number"] {
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
    }
    textarea:focus, select:focus, input:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }
    .label { font-weight: bold; margin-bottom: 6px; margin-top: 10px; }
    .button-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 14px; }
    button, .download-link {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:hover, .download-link:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { cursor: not-allowed; opacity: 0.6; transform: none; }
    .make-btn { background: #42a5f5; color: white; }
    .chat-btn { background: #66bb6a; color: white; }
    .clear-btn { background: #b0bec5; color: white; }
    .auth-btn { background: #37474f; color: white; height: 34px; font-size: 13px; border-radius: 8px; padding: 0 12px; }
    .download-link { background: #7e57c2; color: white; }
    .hidden { display: none; }
    .status { min-height: 24px; margin-top: 14px; color: #555; font-size: 14px; font-weight: bold; }
    .result-box { margin-top: 20px; padding: 18px; border-radius: 18px; background: #f7f9fb; border: 1px solid #edf1f5; }
    .chat-reply { white-space: pre-wrap; line-height: 1.6; font-size: 15px; background: #f1f8e9; padding: 16px; border-radius: 12px; border-left: 5px solid #66bb6a; margin-bottom: 15px; }
    audio { width: 100%; margin-top: 10px; }
    .help { margin-top: 12px; font-size: 13px; color: #777; line-height: 1.6; }
    @media (max-width: 700px) {
      .option-box { grid-template-columns: 1fr; }
      .button-row { justify-content: stretch; }
      button, .download-link { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-bar" id="authBar">
      <input type="email" id="emailInput" class="auth-input" placeholder="이메일">
      <input type="password" id="passwordInput" class="auth-input" placeholder="비밀번호">
      <button id="signUpBtn" class="auth-btn" style="background:#78909c;">회원가입</button>
      <button id="signInBtn" class="auth-btn">로그인</button>
    </div>
    <div class="auth-bar hidden" id="welcomeBar">
      <span id="userInfo" style="font-weight:bold; color:#555; font-size:13px;"></span>
      <button id="signOutBtn" class="auth-btn">로그아웃</button>
    </div>

    <h1>✨ 보이스 크래프트 (VoiceCraft)</h1>
    <div class="subtitle">AI 기획 가이드 및 오디오 원스톱 자동 생성 스튜디오</div>

    <div class="info">
      💡 <b>시스템 통합 완료:</b> 기획 답변(텍스트)과 성우 목소리(오디오) 변환 기능이 한 번에 결합되어 실행됩니다.
    </div>

    <div class="tabs">
      <button id="tabChat" class="tab-btn active">🤖 AI 기획자 대화 + 목소리 합체</button>
      <button id="tabTts" class="tab-btn">🎙️ 일반 텍스트 성우 변환</button>
    </div>

    <div id="mainApp">
      <div id="chatSection">
        <div class="label">목소리 성우 스타일 지정</div>
        <div class="option-box">
          <select id="chatVoiceSelect">
            <option value="alloy">alloy (기본/차분함)</option>
            <option value="echo">echo (부드러움)</option>
            <option value="fable">fable (드라마틱)</option>
            <option value="onyx">onyx (묵직한 남성)</option>
            <option value="nova">nova (밝은 여성)</option>
            <option value="shimmer">shimmer (지적인 여성)</option>
          </select>
          <select id="chatModelSelect">
            <option value="gpt-4o-mini">gpt-4o-mini (빠른 기획)</option>
          </select>
          <input id="chatSpeedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" placeholder="속도" />
        </div>

        <div>
          <div class="label">기획 질문 및 대본 요청하기</div>
          <textarea id="chatInput" placeholder="예시: 유튜브 쇼츠용 정보 전달 나레이션 대본 20초짜리 짜줘, 화장품 광고 카피 3개 추천해줘..."></textarea>
        </div>

        <div class="button-row">
          <button class="clear-btn" id="clearChatBtn">초기화</button>
          <button class="chat-btn" id="submitChatBtn">기획 및 목소리 한 번에 만들기</button>
        </div>

        <div id="chatResultBox" class="result-box hidden">
          <div class="label">AI 기획자 답변 대본</div>
          <div id="chatReply" class="chat-reply"></div>
          
          <div class="label" style="color: #7e57c2;">🎵 매칭 자동 완성 오디오</div>
          <audio id="chatAudioPlayer" controls></audio>
          <div class="button-row">
            <a id="chatDownloadLink" class="download-link" href="#" download="ai-voice.mp3">통합 mp3 다운로드</a>
          </div>
        </div>
      </div>

      <div id="ttsSection" class="hidden">
        <div class="option-box">
          <select id="modelSelect">
            <option value="tts-1">tts-1 빠른 생성</option>
            <option value="tts-1-hd">tts-1-hd 고품질</option>
          </select>
          <select id="voiceSelect">
            <option value="alloy">alloy</option>
            <option value="echo">echo</option>
            <option value="fable">fable</option>
            <option value="onyx">onyx</option>
            <option value="nova">nova</option>
            <option value="shimmer">shimmer</option>
          </select>
          <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" />
        </div>

        <div>
          <div class="label">오디오로 바꿀 일반 텍스트 입력</div>
          <textarea id="textInput" placeholder="적어주신 글을 성우가 읽어줍니다."></textarea>
        </div>

        <div class="button-row">
          <button class="clear-btn" id="clearBtn">초기화</button>
          <button class="make-btn" id="makeBtn">음성 만들기</button>
        </div>

        <div id="resultBox" class="result-box hidden">
          <div class="label">생성된 음성</div>
          <audio id="audioPlayer" controls></audio>
          <div class="button-row">
            <a id="downloadLink" class="download-link" href="#" download="tts-audio.mp3">mp3 다운로드</a>
          </div>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQfMN55VcllE9TAeyrzRHRyzsu2dT3bdA",
      authDomain: "project-f4bd5.firebaseapp.com",
      projectId: "project-f4bd5",
      storageBucket: "project-f4bd5.firebasestorage.app",
      messagingSenderId: "725979068316",
      appId: "1:725979068316:web:c08300ad7cd37845c9ba59",
      measurementId: "G-T52MEST67Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let currentUser = null;

    // 💡 최신 구글 배포 URL 완벽하게 연동 완료!
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9TX0dUlukUVg6tie8HJYBNX3VNJPP60doR6W1TnMpcQCKINbmGm1kMBa0ZmgakVyPQA/exec';

    // DOM 요소정의
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const signUpBtn = document.getElementById('signUpBtn');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const authBar = document.getElementById('authBar');
    const welcomeBar = document.getElementById('welcomeBar');
    const userInfo = document.getElementById('userInfo');

    const tabTts = document.getElementById('tabTts');
    const tabChat = document.getElementById('tabChat');
    const ttsSection = document.getElementById('ttsSection');
    const chatSection = document.getElementById('chatSection');

    const chatInput = document.getElementById('chatInput');
    const chatVoiceSelect = document.getElementById('chatVoiceSelect');
    const chatModelSelect = document.getElementById('chatModelSelect');
    const chatSpeedInput = document.getElementById('chatSpeedInput');
    const submitChatBtn = document.getElementById('submitChatBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const chatResultBox = document.getElementById('chatResultBox');
    const chatReply = document.getElementById('chatReply');
    const chatAudioPlayer = document.getElementById('chatAudioPlayer');
    const chatDownloadLink = document.getElementById('chatDownloadLink');

    const textInput = document.getElementById('textInput');
    const modelSelect = document.getElementById('modelSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speedInput');
    const makeBtn = document.getElementById('makeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultBox = document.getElementById('resultBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');
    const statusBox = document.getElementById('status');

    // 탭메뉴 스위칭
    tabTts.addEventListener('click', () => {
      tabTts.classList.add('active'); tabChat.classList.remove('active');
      ttsSection.classList.remove('hidden'); chatSection.classList.add('hidden');
      statusBox.textContent = '';
    });
    tabChat.addEventListener('click', () => {
      tabChat.classList.add('active'); tabTts.classList.remove('active');
      chatSection.classList.remove('hidden'); ttsSection.classList.add('hidden');
      statusBox.textContent = '';
    });

    // 인증 메커니즘
    signUpBtn.addEventListener('click', () => {
      const email = emailInput.value.trim(); const password = passwordInput.value;
      if(!email || !password) return alert("정보를 기입하세요.");
      createUserWithEmailAndPassword(auth, email, password).then(() => alert("회원가입 완료")).catch(err => alert(err.message));
    });
    signInBtn.addEventListener('click', () => {
      const email = emailInput.value.trim(); const password = passwordInput.value;
      if(!email || !password) return alert("정보를 기입하세요.");
      signInWithEmailAndPassword(auth, email, password).catch(err => alert("에러: " + err.message));
    });
    signOutBtn.addEventListener('click', () => { signOut(auth); });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user; userInfo.textContent = `${user.email}님`;
        authBar.classList.add('hidden'); welcomeBar.classList.remove('hidden');
        makeBtn.disabled = false; submitChatBtn.disabled = false;
      } else {
        currentUser = null; authBar.classList.remove('hidden'); welcomeBar.classList.add('hidden');
        makeBtn.disabled = true; submitChatBtn.disabled = true;
      }
    });

    // 🚀 [합체 기능] 대화 답변 생성과 동시에 보이스 오디오까지 출력
    submitChatBtn.addEventListener('click', async () => {
      if (!currentUser) return alert("로그인 상태에서만 가능합니다.");
      const question = chatInput.value.trim();
      if (!question) return alert('AI 기획자에게 요청할 질문 내용을 적어주세요.');

      try {
        setLoading(true, submitChatBtn, '한 번에 만들기');
        chatResultBox.classList.add('hidden');
        statusBox.textContent = '🚀 AI 기획서(대본)를 설계하고 맞춤 성우 녹음을 동시 진행 중입니다 (약 5~10초 소요)...';

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'combined',
            question: question,
            chatModel: chatModelSelect.value,
            voice: chatVoiceSelect.value,
            speed: Number(chatSpeedInput.value || 1.0)
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        // 글 출력
        chatReply.textContent = data.answer;
        
        // 음성 플레이어 탑재
        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');
        chatAudioPlayer.src = audioUrl;
        chatDownloadLink.href = audioUrl;
        chatDownloadLink.download = `combined-${new Date().getTime()}.mp3`;

        chatResultBox.classList.remove('hidden');
        statusBox.textContent = '✨ 기획서 작성 및 맞춤 목소리 오디오 결합 완료!';
      } catch (error) {
        statusBox.textContent = '통합 실패';
        alert('오류 발생: ' + error.message);
      } finally {
        setLoading(false, submitChatBtn, '기획 및 목소리 한 번에 만들기');
      }
    });

    clearChatBtn.addEventListener('click', () => { chatInput.value = ''; chatResultBox.classList.add('hidden'); statusBox.textContent = ''; });

    // 단독형 기본 TTS 로직
    makeBtn.addEventListener('click', async () => {
      if (!currentUser) return alert("로그인 하세요.");
      const text = textInput.value.trim();
      if (!text) return alert('텍스트를 넣어주세요.');
      try {
        setLoading(true, makeBtn, '음성 만들기');
        resultBox.classList.add('hidden');
        statusBox.textContent = '음성 합성 작동 중...';
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'tts', text, model: modelSelect.value, voice: voiceSelect.value, speed: Number(speedInput.value || 1.0) })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');
        audioPlayer.src = audioUrl;
        downloadLink.href = audioUrl;
        resultBox.classList.remove('hidden');
        statusBox.textContent = '성공!';
      } catch (e) { alert(e.message); } finally { setLoading(false, makeBtn, '음성 만들기'); }
    });
    clearBtn.addEventListener('click', () => { textInput.value = ''; resultBox.classList.add('hidden'); });

    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64); const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }
    function setLoading(isLoading, btnObj, originText) { btnObj.disabled = isLoading; btnObj.textContent = isLoading ? '기획 및 녹음 중...' : originText; }
  </script>
</body>
</html>
