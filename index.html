<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보이스 크래프트 | AI 보이스 스튜디오</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    /* 상단 로그인/회원가입 바 */
    .auth-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .auth-input {
      height: 34px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      width: 140px;
      outline: none;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .info {
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 14px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 14px;
      line-height: 1.6;
    }

    /* 탭 메뉴 스타일 */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #edf1f5;
      padding-bottom: 10px;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: #888;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
      height: auto;
      border-radius: 8px;
      transition: 0.2s;
    }
    .tab-btn.active {
      color: #42a5f5;
      background: rgba(66, 165, 245, 0.1);
    }

    .option-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    select, input[type="number"] {
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
      font-family: Arial, sans-serif;
    }

    textarea:focus, select:focus, input:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, .download-link {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover, .download-link:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .make-btn { background: #42a5f5; color: white; }
    .chat-btn { background: #66bb6a; color: white; }
    .clear-btn { background: #b0bec5; color: white; }
    .auth-btn { background: #37474f; color: white; height: 34px; font-size: 13px; border-radius: 8px; padding: 0 12px; }
    .download-link { background: #7e57c2; color: white; }

    .hidden { display: none; }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: #555;
      font-size: 14px;
    }

    .result-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: #f7f9fb;
      border: 1px solid #edf1f5;
    }

    .chat-reply {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
      background: #f1f8e9;
      padding: 16px;
      border-radius: 12px;
      border-left: 5px solid #66bb6a;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .help {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .option-box { grid-template-columns: 1fr; }
      .button-row { justify-content: stretch; }
      button, .download-link { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-bar" id="authBar">
      <input type="email" id="emailInput" class="auth-input" placeholder="이메일">
      <input type="password" id="passwordInput" class="auth-input" placeholder="비밀번호">
      <button id="signUpBtn" class="auth-btn" style="background:#78909c;">회원가입</button>
      <button id="signInBtn" class="auth-btn">로그인</button>
    </div>
    <div class="auth-bar hidden" id="welcomeBar">
      <span id="userInfo" style="font-weight:bold; color:#555; font-size:13px;"></span>
      <button id="signOutBtn" class="auth-btn">로그아웃</button>
    </div>

    <h1>✨ 보이스 크래프트 (VoiceCraft)</h1>
    <div class="subtitle">나만의 오디오 콘텐츠 공방 및 AI 기획 어시스턴트</div>

    <div class="info">
      현재 구조: GitHub Pages 화면 ➡️ Google Apps Script 서버(CORS 우회 완료) ➡️ OpenAI API ➡️ 결과 반환<br />
      API Key는 안전하게 Apps Script 시스템 내부 속성에 보호되어 있습니다.
    </div>

    <div class="tabs">
      <button id="tabTts" class="tab-btn active">🎙️ AI 목소리 생성</button>
      <button id="tabChat" class="tab-btn">🤖 AI 기획자 대화</button>
    </div>

    <div id="mainApp">
      <div id="ttsSection">
        <div class="option-box">
          <select id="modelSelect">
            <option value="tts-1">tts-1 빠른 생성</option>
            <option value="tts-1-hd">tts-1-hd 고품질</option>
          </select>
          <select id="voiceSelect">
            <option value="alloy">alloy</option>
            <option value="echo">echo</option>
            <option value="fable">fable</option>
            <option value="onyx">onyx</option>
            <option value="nova">nova</option>
            <option value="shimmer">shimmer</option>
          </select>
          <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" placeholder="속도" />
        </div>

        <div>
          <div class="label">변환할 텍스트</div>
          <textarea id="textInput" placeholder="음성으로 바꿀 문장을 입력하세요."></textarea>
        </div>

        <div class="button-row">
          <button class="clear-btn" id="clearBtn">초기화</button>
          <button class="make-btn" id="makeBtn">음성 만들기</button>
        </div>

        <div id="resultBox" class="result-box hidden">
          <div class="label">생성된 음성</div>
          <audio id="audioPlayer" controls></audio>
          <div class="button-row">
            <a id="downloadLink" class="download-link" href="#" download="tts-audio.mp3">mp3 다운로드</a>
          </div>
        </div>
      </div>

      <div id="chatSection" class="hidden">
        <div>
          <div class="label">기획자에게 질문하기</div>
          <textarea id="chatInput" placeholder="예시: 유튜브 나레이션 대본 짜줘, 마케팅 카피 문구 추천해줘 등..."></textarea>
        </div>

        <div class="button-row">
          <button class="clear-btn" id="clearChatBtn">초기화</button>
          <button class="chat-btn" id="submitChatBtn">질문 보내기</button>
        </div>

        <div id="chatResultBox" class="result-box hidden">
          <div class="label">AI 기획자의 답변</div>
          <div id="chatReply" class="chat-reply"></div>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="help">
      로그인 후 서비스를 이용하실 수 있습니다. 카피라이팅 전문가 GPT와 오디오 성우 TTS가 연동되어 작동합니다.
    </div>
  </div>

  <script type="module">
    // Firebase 모듈 연동
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQfMN55VcllE9TAeyrzRHRyzsu2dT3bdA",
      authDomain: "project-f4bd5.firebaseapp.com",
      projectId: "project-f4bd5",
      storageBucket: "project-f4bd5.firebasestorage.app",
      messagingSenderId: "725979068316",
      appId: "1:725979068316:web:c08300ad7cd37845c9ba59",
      measurementId: "G-T52MEST67Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let currentUser = null;

    // 💡 새로운 구글 웹 앱 URL 주소 반영 완료!
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbbyZafRQXMGhaEnXTJiRmAxo1-bD8UaH0CZnmlYe08Xpo7I6fnDgk0OnyukVkHbJynQMnA/exec';

    // DOM 요소 선언
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const signUpBtn = document.getElementById('signUpBtn');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const authBar = document.getElementById('authBar');
    const welcomeBar = document.getElementById('welcomeBar');
    const userInfo = document.getElementById('userInfo');

    const tabTts = document.getElementById('tabTts');
    const tabChat = document.getElementById('tabChat');
    const ttsSection = document.getElementById('ttsSection');
    const chatSection = document.getElementById('chatSection');

    const textInput = document.getElementById('textInput');
    const modelSelect = document.getElementById('modelSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speedInput');
    const makeBtn = document.getElementById('makeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');

    const chatInput = document.getElementById('chatInput');
    const submitChatBtn = document.getElementById('submitChatBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const chatResultBox = document.getElementById('chatResultBox');
    const chatReply = document.getElementById('chatReply');

    // 탭 전환 이벤트 리스너
    tabTts.addEventListener('click', () => {
      tabTts.classList.add('active'); tabChat.classList.remove('active');
      ttsSection.classList.remove('hidden'); chatSection.classList.add('hidden');
      statusBox.textContent = '';
    });
    tabChat.addEventListener('click', () => {
      tabChat.classList.add('active'); tabTts.classList.remove('active');
      chatSection.classList.remove('hidden'); ttsSection.classList.add('hidden');
      statusBox.textContent = '';
    });

    // Firebase 회원 메커니즘
    signUpBtn.addEventListener('click', () => {
      const email = emailInput.value.trim(); const password = passwordInput.value;
      if(!email || !password) return alert("이메일과 비밀번호를 입력해주세요.");
      createUserWithEmailAndPassword(auth, email, password).then(() => alert("회원가입 완료!")).catch(err => alert(err.message));
    });
    signInBtn.addEventListener('click', () => {
      const email = emailInput.value.trim(); const password = passwordInput.value;
      if(!email || !password) return alert("이메일과 비밀번호를 입력해주세요.");
      signInWithEmailAndPassword(auth, email, password).catch(err => alert("로그인 실패: " + err.message));
    });
    signOutBtn.addEventListener('click', () => { signOut(auth); });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user; userInfo.textContent = `${user.email}님 오신 것을 환영합니다.`;
        authBar.classList.add('hidden'); welcomeBar.classList.remove('hidden');
        makeBtn.disabled = false; submitChatBtn.disabled = false;
      } else {
        currentUser = null; authBar.classList.remove('hidden'); welcomeBar.classList.add('hidden');
        makeBtn.disabled = true; submitChatBtn.disabled = true;
        resultBox.classList.add('hidden'); chatResultBox.classList.add('hidden');
      }
    });

    // --- 1. TTS 음성 만들기 요청 ---
    makeBtn.addEventListener('click', makeSpeech);
    clearBtn.addEventListener('click', () => { textInput.value = ''; resultBox.classList.add('hidden'); statusBox.textContent = ''; });

    async function makeSpeech() {
      if (!currentUser) return alert("로그인 후 이용할 수 있습니다.");
      const text = textInput.value.trim();
      if (!text) return alert('음성으로 변환할 텍스트를 입력해주세요.');

      try {
        setLoading(true, makeBtn, '음성 만들기');
        resultBox.classList.add('hidden');
        statusBox.textContent = 'Apps Script 서버에 TTS 요청을 보내는 중입니다...';

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'tts',
            text: text,
            model: modelSelect.value,
            voice: voiceSelect.value,
            speed: Number(speedInput.value || 1.0)
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (!data.audioBase64) throw new Error('음성 데이터를 받지 못했습니다.');

        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');
        audioPlayer.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.download = `tts-${new Date().getTime()}.mp3`;
        resultBox.classList.remove('hidden');
        statusBox.textContent = '✨ 음성 생성 완료!';
      } catch (error) {
        statusBox.textContent = '요청 실패';
        alert('오류가 발생했습니다: ' + error.message);
      } finally {
        setLoading(false, makeBtn, '음성 만들기');
      }
    }

    // --- 2. AI 기획자 대화 요청 ---
    submitChatBtn.addEventListener('click', askAI);
    clearChatBtn.addEventListener('click', () => { chatInput.value = ''; chatResultBox.classList.add('hidden'); statusBox.textContent = ''; });

    async function askAI() {
      if (!currentUser) return alert("로그인 후 이용할 수 있습니다.");
      const question = chatInput.value.trim();
      if (!question) return alert('질문을 입력해주세요.');

      try {
        setLoading(true, submitChatBtn, '질문 보내기');
        chatResultBox.classList.add('hidden');
        statusBox.textContent = 'AI 기획자가 아이디어를 구상하고 있습니다...';

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'chat',
            question: question
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        chatReply.textContent = data.answer;
        chatResultBox.classList.remove('hidden');
        statusBox.textContent = '💡 답변 생성 완료!';
      } catch (error) {
        statusBox.textContent = '대화 실패';
        alert('오류가 발생했습니다: ' + error.message);
      } finally {
        setLoading(false, submitChatBtn, '질문 보내기');
      }
    }

    // 데이터 유틸 함수
    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64); const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }

    function setLoading(isLoading, btnObj, originText) {
      btnObj.disabled = isLoading;
      btnObj.textContent = isLoading ? '생성 중...' : originText;
    }
  </script>
</body>
</html>
